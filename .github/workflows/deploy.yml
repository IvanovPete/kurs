name: CI/CD - Build, Push & Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== 1. BUILD & PUSH to Docker Hub ====================
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./kurs_backend
          file: ./kurs_backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kurs-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/kurs-backend:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./kurs_frontend
          file: ./kurs_frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kurs-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/kurs-frontend:${{ github.sha }}

      # ==================== 2. DEPLOY on Server via SSH ====================
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/kurs

            echo "Pulling latest images..."
            docker compose pull

            echo "Restarting containers..."
            docker compose up -d --remove-orphans

            echo "Cleaning old images..."
            docker image prune -af
