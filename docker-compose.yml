version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kurs_db
    environment:
      - POSTGRES_DB=kurs_db
      - POSTGRES_USER=kurs_user
      - POSTGRES_PASSWORD=kurs_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kurs_user -d kurs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${DOCKER_USERNAME}/kurs-backend:latest
    container_name: kurs_backend
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,${SERVER_DOMAIN}
      - DB_HOST=db
      - DB_NAME=kurs_db
      - DB_USER=kurs_user
      - DB_PASSWORD=kurs_password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: ${DOCKER_USERNAME}/kurs-nginx:latest
    container_name: kurs_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

